<!DOCTYPE html>
<html lang="fa">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>عنباری</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

    html,body{
    width:100%;
    height:100%;
    background:#000;
    overflow-y:scroll;
    scroll-snap-type:y mandatory;
    scroll-behavior:smooth;
    }

.item{
    width:100vw;
    height:100vh;
    scroll-snap-align:start;
    scroll-snap-stop:always;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#000;
}

img,video{
    width:100%;
    height:100%;
    object-fit:contain;
}

.logo{
    position:fixed;
    top:15px;
    left:50%;
    transform:translateX(-50%);
    width:40px;
    z-index:9999;
}
#splash{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:#000;
    display:flex;
    justify-content:center;
    align-items:center;
    z-index:99999;
    opacity:1;
    transition:opacity 0.8s ease;
}

#splash.hide{
    opacity:0;
    pointer-events:none;
}
    #popup{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.9);
    display:none;
    justify-content:center;
    align-items:center;
    z-index:100000;
}

#popup-box{
    border:2px solid red;
    color:white;
    padding:20px;
    border-radius:10px;
    font-size:20px;
    text-align:center;
}
</style>
</head>
<script>
async function uploadImage() {
  const file = document.getElementById("fileInput").files[0];

  const formData = new FormData();
  formData.append("file", file);
  formData.append("upload_preset", "anbari");

  const res = await fetch("https://api.cloudinary.com/v1_1/deyzaowih/image/upload", {
    method: "POST",
    body: formData
  });

  const data = await res.json();

  console.log(data);

  
  document.getElementById("preview").src = data.secure_url;
}
window.addEventListener("load", () => {
    setTimeout(() => {
        const splash = document.getElementById("splash");

        splash.classList.add("hide");

        setTimeout(() => {
            splash.remove();
        }, 800);
    }, 2000);
});
</script>
    <body>

<img id="preview" style="max-width:200px; display:block; margin-top:10px;">
  <div id="popup">
    <div id="popup-box">
        آیدی تلگرام:<br>
        @aghey
    </div>
  </div>

<script>
const container = document.body;

const items = [...document.querySelectorAll('.item')];

items.sort(() => Math.random() - 0.5);

items.forEach(item => container.appendChild(item));
    
    const observer = new IntersectionObserver((entries) => {
  entries.forEach((entry) => {
    const video = entry.target.querySelector("video");

    if (!video) return;

    if (entry.isIntersecting) {
      video.play().catch(() => {});
    } else {
      video.pause();
    }
  });
}, {
  threshold: 0.7
});

document.querySelectorAll(".item").forEach(item => {
  observer.observe(item);
});
const logo = document.querySelector(".logo");
const popup = document.getElementById("popup");

logo.addEventListener("click", () => {
    popup.style.display = "flex";
});

popup.addEventListener("click", () => {
    popup.style.display = "none";
});
</script>
