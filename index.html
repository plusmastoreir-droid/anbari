<script>
async function uploadImage() {
  const file = document.getElementById("fileInput").files[0];

  const formData = new FormData();
  formData.append("file", file);
  formData.append("upload_preset", "anbari");

  const res = await fetch("https://api.cloudinary.com/v1_1/deyzaowih/image/upload", {
    method: "POST",
    body: formData
  });

  const data = await res.json();

  console.log(data);

  
  document.getElementById("preview").src = data.secure_url;
}
window.addEventListener("load", () => {
    setTimeout(() => {
        const splash = document.getElementById("splash");

        splash.classList.add("hide");

        setTimeout(() => {
            splash.remove();

    }, 2000);
});

<script>
const container = document.body;
if ('scrollRestoration' in history) {
  history.scrollRestoration = "manual";
}

window.addEventListener("load", () => {
  window.scrollTo(0, 0);
});

// ===============================
// 1. COLLECT ITEMS
// ===============================
let items = Array.from(document.querySelectorAll(".item"));
const container = document.body;

// ===============================
// 2. SHUFFLE ONCE
// ===============================
items.sort(() => Math.random() - 0.5);
items.forEach(i => container.appendChild(i));

// ===============================
// 3. VIDEO OPTIMIZED AUTOPLAY
// ===============================
const videoObserver = new IntersectionObserver((entries) => {
  entries.forEach(entry => {
    const video = entry.target.querySelector("video");
    if (!video) return;

    if (entry.isIntersecting) {
      video.play().catch(() => {});
    } else {
      video.pause();
    }
  });
}, {
  threshold: 0.75
});

// ===============================
// 4. PRELOAD ONLY +1 ITEM
// ===============================
const preloadObserver = new IntersectionObserver((entries) => {
  entries.forEach(entry => {
    if (!entry.isIntersecting) return;

    const current = entry.target;
    const next = current.nextElementSibling;

    if (!next || !next.classList.contains("item")) return;

    const img = next.querySelector("img");
    if (img && !img.src && img.dataset.src) {
      img.src = img.dataset.src;
    }

    const video = next.querySelector("video");
    if (video && !video.src) {
      const src = video.getAttribute("src");
      if (src) {
        const link = document.createElement("link");
        link.rel = "preload";
        link.as = "video";
        link.href = src;
        document.head.appendChild(link);
      }
    }
  });
}, {
  threshold: 0.6
});

// ===============================
// 5. SIMPLE INFINITE (SMART REUSE)
// ===============================
const recycleBuffer = [];

const recycleObserver = new IntersectionObserver((entries) => {
  entries.forEach(entry => {
    if (!entry.isIntersecting) return;

    const item = entry.target;

    const index = items.indexOf(item);

    // وقتی به آخر نزدیک شدی → آیتم‌های قدیمی رو recycle کن
    if (index >= items.length - 3) {
      items.slice(0, 5).forEach(oldItem => {
        const clone = oldItem.cloneNode(true);

        container.appendChild(clone);

        videoObserver.observe(clone);
        preloadObserver.observe(clone);
        recycleObserver.observe(clone);

        recycleBuffer.push(clone);
      });

      // cleanup memory (خیلی مهم)
      if (recycleBuffer.length > 30) {
        const removed = recycleBuffer.splice(0, 10);
        removed.forEach(el => el.remove());
      }
    }
  });
}, {
  threshold: 1.0
});

// ===============================
// 6. INIT OBSERVERS
// ===============================
items.forEach(item => {
  videoObserver.observe(item);
  preloadObserver.observe(item);
  recycleObserver.observe(item);
});

// ===============================
// 7. SPLASH SAFE FIX
// ===============================
setTimeout(() => {
  const splash = document.getElementById("splash");
  if (splash) {
    splash.style.transition = "opacity 0.8s ease";
    splash.style.opacity = "0";

    setTimeout(() => splash.remove(), 800);
  }
}, 2000);

// ===============================
// 8. POPUP
// ===============================
const logo = document.querySelector(".logo");
const popup = document.getElementById("popup");

logo?.addEventListener("click", () => {
  popup.style.display = "flex";
});

popup?.addEventListener("click", () => {
  popup.style.display = "none";
});
</script>
