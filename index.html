<!DOCTYPE html>
<html lang="fa">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>عنباری</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,body{
    width:100%;
    height:100%;
    background:#000;
    overflow-y:scroll;
    scroll-snap-type:y mandatory;
    scroll-behavior:smooth;
}

.item{
    width:100vw;
    height:100vh;
    scroll-snap-align:start;
    scroll-snap-stop:always;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#000;
}

img,video{
    width:100%;
    height:100%;
    object-fit:contain;
}

.logo{
    position:fixed;
    top:15px;
    left:50%;
    transform:translateX(-50%);
    width:40px;
    z-index:9999;
}

#splash{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:#000;
    display:flex;
    justify-content:center;
    align-items:center;
    z-index:99999;
    opacity:1;
    transition:opacity 0.8s ease;
}

#splash.hide{
    opacity:0;
    pointer-events:none;
}

#popup{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.9);
    display:none;
    justify-content:center;
    align-items:center;
    z-index:100000;
}

#popup-box{
    border:2px solid red;
    color:white;
    padding:20px;
    border-radius:10px;
    font-size:20px;
    text-align:center;
}
</style>
</head>

<body>

<div id="splash">
    <img src="logo.png">
</div>

<div class="logo">
    <img src="logo.png">
</div>

<div id="popup">
    <div id="popup-box">
        آیدی تلگرام:<br>
        @aghey
    </div>
</div>

<script>
window.addEventListener("load", () => {
    setTimeout(() => {
        document.getElementById("splash").classList.add("hide");
        setTimeout(() => document.getElementById("splash").remove(), 800);
    }, 2000);
});

// ===== LAZY FEED (هر 5 پست) =====
let page = 1;
const PER_PAGE = 5;
const MAX_ITEMS = 500;

function loadPage(p){

    const start = ((p - 1) * PER_PAGE) + 1;
    const end = Math.min(start + PER_PAGE - 1, MAX_ITEMS);

    for(let i = start; i <= end; i++){

        document.body.insertAdjacentHTML("beforeend",
        `<div class="item">
            <img loading="lazy"
                 src="media/${i}.png"
                 onerror="this.closest('.item').remove()">
        </div>`);

        document.body.insertAdjacentHTML("beforeend",
        `<div class="item">
            <video src="media/${i}.mp4"
                   controls
                   preload="none"
                   onerror="this.closest('.item').remove()">
            </video>
        </div>`);
    }
}

loadPage(page);

window.addEventListener("scroll", () => {
    if(window.innerHeight + window.scrollY >= document.body.offsetHeight - 1000){
        page++;
        loadPage(page);
    }
});

// ===== VIDEO PLAY CONTROL =====
const observer = new IntersectionObserver((entries)=>{
    entries.forEach(entry=>{
        const video = entry.target.querySelector("video");
        if(!video) return;

        if(entry.isIntersecting){
            video.play().catch(()=>{});
        } else {
            video.pause();
        }
    });
},{threshold:0.7});

setInterval(()=>{
    document.querySelectorAll(".item").forEach(item=>{
        observer.observe(item);
    });
},1000);

// ===== POPUP =====
document.querySelector(".logo").addEventListener("click", ()=>{
    document.getElementById("popup").style.display="flex";
});

document.getElementById("popup").addEventListener("click", ()=>{
    document.getElementById("popup").style.display="none";
});
</script>

</body>
</html>
