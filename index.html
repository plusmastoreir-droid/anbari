<!DOCTYPE html>
<html lang="fa">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anbari</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#000;
overflow-y:scroll;
scroll-snap-type:y mandatory;
}

.item{
width:100vw;
height:100vh;
scroll-snap-align:start;
display:flex;
justify-content:center;
align-items:center;
background:#000;
}

img,video{
width:100%;
height:100%;
object-fit:contain;
}
</style>
</head>
<body id="gallery"></body>

<script>
const USER = "plusmastoreir-droid";
const REPO = "anbari";
const FOLDER = "media";

fetch(`https://api.github.com/repos/${USER}/${REPO}/contents/${FOLDER}`)
.then(r => r.json())
.then(files => {

files.sort(() => Math.random() - 0.5);

const gallery = document.getElementById("gallery");

files.forEach(file => {

const div = document.createElement("div");
div.className = "item";

if(file.name.match(/\.(jpg|jpeg|png|webp|gif)$/i)){
div.innerHTML =
`<img src="${file.download_url}" loading="lazy">`;
}

else if(file.name.match(/\.(mp4|webm|mov)$/i)){
div.innerHTML =
`<video src="${file.download_url}" controls preload="metadata"></video>`;
}

gallery.appendChild(div);

});

});
</script>

</html>
