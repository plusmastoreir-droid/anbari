<!DOCTYPE html>
<html lang="fa">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>عنباری</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

    html,body{
    width:100%;
    height:100%;
    background:#000;
    overflow-y:scroll;
    scroll-snap-type:y mandatory;
    scroll-behavior:smooth;
    }

.item{
    width:100vw;
    height:100vh;
    scroll-snap-align:start;
    scroll-snap-stop:always;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#000;
}

img,video{
    width:100%;
    height:100%;
    object-fit:contain;
}
    <style>

.logo{
    position:fixed;
    top:15px;
    left:50%;
    transform:translateX(-50%);
    width:120px;
    z-index:9999;
}
</style>

</head>
<body>

<div class="item">
    <video src="media/1.mp4" controls></video>
</div>

<div class="item">
    <video src="media/2.mp4" controls></video>
</div>

<div class="item">
    <video src="media/3.mp4" controls></video>
</div>

<div class="item">
    <video src="media/4.mp4" controls></video>
</div>
<script>
const container = document.body;

const items = [...document.querySelectorAll('.item')];

items.sort(() => Math.random() - 0.5);

items.forEach(item => container.appendChild(item));
    
    const observer = new IntersectionObserver((entries) => {
  entries.forEach((entry) => {
    const video = entry.target.querySelector("video");

    if (!video) return;

    if (entry.isIntersecting) {
      video.play().catch(() => {});
    } else {
      video.pause();
    }
  });
}, {
  threshold: 0.7
});

document.querySelectorAll(".item").forEach(item => {
  observer.observe(item);
});
</script>
</body>
    <img src="logo.png" class="logo">
</html>
