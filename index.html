<!DOCTYPE html>
<html lang="fa">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>عنباری</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

    html,body{
    width:100%;
    height:100%;
    background:#000;
    overflow-y:scroll;
    scroll-snap-type:y mandatory;
    scroll-behavior:smooth;
    }

.item{
    width:100vw;
    height:100vh;
    scroll-snap-align:start;
    scroll-snap-stop:always;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#000;
}

img,video{
    width:100%;
    height:100%;
    object-fit:contain;
}

.logo{
    position:fixed;
    top:15px;
    left:50%;
    transform:translateX(-50%);
    width:120px;
    z-index:9999;
}
#splash{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:#000;
    display:flex;
    justify-content:center;
    align-items:center;
    z-index:99999;
    opacity:1;
    transition:opacity 0.8s ease;
}

#splash.hide{
    opacity:0;
    pointer-events:none;
}
</style>
</head>
<script>
window.addEventListener("load", () => {
    setTimeout(() => {
        const splash = document.getElementById("splash");

        splash.classList.add("hide");

        setTimeout(() => {
            splash.remove();
        }, 800);
    }, 2000);
});
</script>
    <body>
    <div id="splash">
    <img src="logo.png" alt="Logo">
    </div>
<div class="logo">
    <img src="logo.png">
</div>
<div class="item">
    <video src="media/1.mp4" controls></video>
</div>

<div class="item">
    <video src="media/2.mp4" controls></video>
</div>

<div class="item">
    <video src="media/3.mp4" controls></video>
</div>

<div class="item">
    <video src="media/4.mp4" controls></video>
</div>
<script>
const container = document.body;

const items = [...document.querySelectorAll('.item')];

items.sort(() => Math.random() - 0.5);

items.forEach(item => container.appendChild(item));
    
    const observer = new IntersectionObserver((entries) => {
  entries.forEach((entry) => {
    const video = entry.target.querySelector("video");

    if (!video) return;

    if (entry.isIntersecting) {
      video.play().catch(() => {});
    } else {
      video.pause();
    }
  });
}, {
  threshold: 0.7
});

document.querySelectorAll(".item").forEach(item => {
  observer.observe(item);
});
</script>
</body>
    <div class="logo">
    <img src="logo.png">
    </div>
</html>
